version: "3.9"

services:
  api:
    build: .
    container_name: tuncay-klip-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DEPLOYMENT_ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-klip}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-klip}
      - EVENT_BUS_BACKEND=redis
      - KICK_CHANNEL_SLUG=thetuncay
      - KICK_ARCHIVE_AUTOSTART=true
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./clips:/app/clips
      - ./models_store:/app/models_store
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: tuncay-klip-redis
    restart: unless-stopped
    # Ports NOT exposed to host — only accessible via Docker network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  postgres:
    image: postgres:16-alpine
    container_name: tuncay-klip-postgres
    restart: unless-stopped
    # Ports NOT exposed to host — only accessible via Docker network
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-klip}
      POSTGRES_USER: ${POSTGRES_USER:-klip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-klip}"]
      interval: 10s
      timeout: 3s
      retries: 5

  grafana:
    image: grafana/grafana:11.0.0
    container_name: tuncay-klip-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    profiles:
      - monitoring

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: tuncay-klip-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    profiles:
      - monitoring

volumes:
  redis_data:
  postgres_data:
  grafana_data:
  prometheus_data:
