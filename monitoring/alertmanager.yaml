# Alertmanager — alert routing (IP_PART6 36.5)
route:
  receiver: default
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: ['severity="critical"']
      receiver: pagerduty
      continue: true
    - matchers: ['severity="warning"']
      receiver: slack
receivers:
  - name: pagerduty
    pagerduty_configs:
      - service_key: "${PD_KEY}"
  - name: slack
    slack_configs:
      - api_url: "${SLACK_WEBHOOK}"
        channel: "#ip-alerts"
  - name: default
    slack_configs:
      - api_url: "${SLACK_WEBHOOK}"
        channel: "#ip-noise"
inhibit_rules:
  - source_matchers: ['severity="critical"']
    target_matchers: ['severity="warning"']
    equal: ["service"]      # bir critical aktifken warning'leri bastır
