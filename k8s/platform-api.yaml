# Platform API — Deployment + Service + HPA + PDB (IP_PART6 39.2, 39.5)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  labels: { app: platform-api }
spec:
  replicas: 3
  selector:
    matchLabels: { app: platform-api }
  template:
    metadata:
      labels: { app: platform-api }
    spec:
      # Replikaları zone'lara yay (AZ arızasında hayatta kal — 39.5)
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app: platform-api }
      containers:
        - name: platform-api
          image: ghcr.io/ip/platform-api:latest   # CD tarafından tag bump edilir
          ports:
            - containerPort: 8000
          env:
            - name: PROMETHEUS_METRICS_ENABLED
              value: "true"
            - name: OTEL_ENABLED
              value: "true"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: LOG_FORMAT
              value: "json"
          resources:
            requests: { cpu: "500m", memory: 512Mi }
            limits: { cpu: "2", memory: 1Gi }
          readinessProbe:
            httpGet: { path: /ready, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: platform-api
spec:
  selector: { app: platform-api }
  ports:
    - port: 8000
      targetPort: 8000
---
# HPA — custom metric (queue depth) üzerinden ölçekleme (IP_PART6 39.2)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: platform-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: platform-api
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300     # yavaş scale-down (flapping önleme)
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# PodDisruptionBudget — voluntary disruption sırasında min replika (39.5)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: platform-api-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels: { app: platform-api }
