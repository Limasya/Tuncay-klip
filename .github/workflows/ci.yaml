# CI pipeline (IP_PART6 40.2)
name: ci
on:
  pull_request:
  push: { branches: [main] }

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: ruff check .                 # lint
      - run: pytest -q --cov=. --cov-fail-under=80
      - name: Security scan
        run: |
          pip install bandit
          bandit -r services microservices platform_eng -ll

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write, id-token: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/ip/platform-api:${{ github.sha }}
      - name: Sign image (cosign / keyless)
        run: cosign sign --yes ghcr.io/ip/platform-api:${{ github.sha }}
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/ip/platform-api:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
