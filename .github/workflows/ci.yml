name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/video-processor/target
          key: rust-${{ runner.os }}-${{ hashFiles('tools/video-processor/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Build Rust video-processor
        run: cargo build --release
        working-directory: tools/video-processor

      - name: Install Python dependencies
        run: pip install -r requirements-base.txt -r requirements-ml.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --timeout=60
        env:
          PYTHONPATH: .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Check linting
        run: ruff check . --select E,F --ignore E501

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dashboard dependencies
        run: npm ci
        working-directory: dashboard

      - name: Build TypeScript
        run: npm run build
        working-directory: dashboard
